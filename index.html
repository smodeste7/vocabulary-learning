<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#0f1923">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Darija Vocab">
  <title>Darija Vocabulaire</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <!-- Police arabe lisible (Naskh). system-ui pour l'interface (zéro dépendance). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Filigrane : mot du jour en ambre transparent, géant, en fond d'accueil. -->
  <div id="watermark" aria-hidden="true"></div>

  <!-- Conteneur de vue : chaque écran y est injecté par le routeur. -->
  <main id="view" role="main"></main>

  <!-- Barre de navigation : en bas, accessible au pouce. -->
  <nav id="tabbar" aria-label="Navigation principale">
    <a href="#home" class="tab" data-route="home" aria-label="Accueil">
      <span class="tab-ico" aria-hidden="true">⌂</span><span class="tab-lbl">Accueil</span>
    </a>
    <a href="#themes" class="tab" data-route="themes" aria-label="Thèmes">
      <span class="tab-ico" aria-hidden="true">⊞</span><span class="tab-lbl">Thèmes</span>
    </a>
    <a href="#flashcard/all" class="tab" data-route="flashcard" aria-label="Réviser maintenant">
      <span class="tab-ico" aria-hidden="true">⇄</span><span class="tab-lbl">Réviser</span>
      <span id="due-badge" class="badge" hidden>0</span>
    </a>
    <a href="#settings" class="tab" data-route="settings" aria-label="Réglages">
      <span class="tab-ico" aria-hidden="true">⚙︎</span><span class="tab-lbl">Réglages</span>
    </a>
  </nav>

  <!-- Toast de feedback léger. -->
  <div id="toast" role="status" aria-live="polite" hidden></div>

  <!-- Audio de lecture des mots et phrases. -->
  <audio id="player" preload="none"></audio>

  <!-- Google Identity Services (sync Drive ; non bloquant). -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
